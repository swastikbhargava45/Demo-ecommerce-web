<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div id="global-loader" class="loader-overlay">
        <div class="spinner"></div>
    </div>

    <header class="site-header">
        <div class="header-inner container">
            <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">
                <i class="ph ph-list"></i>
            </button>
            
            <a href="#home" class="logo" id="site-logo">Store</a>
            
            <nav class="main-nav" id="main-nav">
                <div class="nav-links">
                    <a href="#home" class="nav-link">Home</a>
                    <a href="#shop" class="nav-link">Shop</a>
                    <a href="#contact" class="nav-link">Contact</a>
                </div>
            </nav>

            <div class="header-actions">
                <a href="#cart" class="cart-icon" aria-label="Cart">
                    <i class="ph ph-shopping-bag"></i>
                    <span class="cart-count" id="cart-count">0</span>
                </a>
            </div>
        </div>
    </header>

    <main id="app-root" class="fade-enter"></main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-brand">
                    <h3 id="footer-logo" class="logo">Store</h3>
                    <p class="footer-desc">Curated essentials for the modern lifestyle. Quality over quantity, always.</p>
                </div>
                <div class="footer-links-col">
                    <h4>Navigation</h4>
                    <a href="#home">Home</a>
                    <a href="#shop">Shop</a>
                    <a href="#contact">Contact</a>
                </div>
                <div class="footer-links-col">
                    <h4>Support</h4>
                    <a href="#contact">FAQ</a>
                    <a href="#contact">Shipping & Returns</a>
                    <a href="#contact">Terms of Service</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p id="footer-text" class="footer-copyright">&copy; 2026 Store. All rights reserved.</p>
                <div class="payment-icons">
                    <i class="ph ph-credit-card"></i>
                    <i class="ph ph-wallet"></i>
                    <i class="ph ph-bank"></i>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="./js/cart.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
